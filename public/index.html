<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Farmers Registration - Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="styles/main.css" rel="stylesheet">
  <base href="/">
</head>
<body>
  <div class="login-container">
    <div class="card">
      <div class="card-body">
        <h2 class="card-title text-center">Farmers Registration System</h2>
        <div id="login-section">
          <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" class="form-control" id="email" placeholder="Enter your email">
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" id="password" placeholder="Enter your password">
          </div>
          <button id="login-btn" class="btn btn-primary w-100">Login</button>
          <div class="text-center mt-3">
            <a href="#" id="signup-link">Don't have an account? Sign up</a>
          </div>
        </div>
        <div id="signup-section" style="display: none;">
          <div class="mb-3">
            <label for="signup-email" class="form-label">Email</label>
            <input type="email" class="form-control" id="signup-email" placeholder="Enter your email">
          </div>
          <div class="mb-3">
            <label for="signup-password" class="form-label">Password</label>
            <input type="password" class="form-control" id="signup-password" placeholder="Create a password (min 6 chars)">
          </div>
          <button id="signup-btn" class="btn btn-success w-100">Sign Up</button>
          <div class="text-center mt-3">
            <a href="#" id="login-link">Already have an account? Login</a>
          </div>
        </div>
      </div>
    </div>
  </div>
  <!-- Load Supabase first -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<!-- Then your auth.js -->
<script src="/scripts/auth.js"></script>
  <script>
  console.log('Testing script loading...');
  try {
    fetch('/scripts/auth.js')
      .then(response => {
        console.log('Auth.js status:', response.status);
        return response.text();
      })
      .then(text => {
        console.log('First 50 chars:', text.substring(0, 50));
      });
  } catch (e) {
    console.error('Fetch test failed:', e);
  }
</script>
</body>
</html>
